name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: npm run build

      - name: Sanitize FTP Server Host
        id: sanitize
        run: |
          # Remove ftp://, ftps://, spaces, and trailing slashes from the server host
          CLEAN_HOST=$(echo "${{ secrets.FTP_SERVER }}" | sed -e 's|^ftp://||i' -e 's|^ftps://||i' -e 's|/$||' -e 's|^[[:space:]]*||' -e 's|[[:space:]]*$||')
          echo "host=$CLEAN_HOST" >> $GITHUB_OUTPUT

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.sanitize.outputs.host }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
