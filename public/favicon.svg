<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded Background -->
  <rect width="64" height="64" rx="16" fill="#0F2232" />
  
  <!-- Outer glowing border subtle -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="rgba(229, 193, 88, 0.15)" stroke-width="1" />

  <!-- Logo Icon -->
  <g transform="translate(1, 1)">
    <!-- White Base (curve representation) -->
    <path d="M18 43 C18 47 44 47 44 43 C38 45.5 24 45.5 18 43 Z" fill="#FFFFFF" />
    
    <!-- Left Pillar -->
    <path d="M22 43 L22 30 C22 28.5 24.5 28.5 24.5 30 L24.5 43 Z" fill="#FFFFFF" />
    
    <!-- Middle Pillar -->
    <path d="M27.5 43 L27.5 22 C27.5 20.5 30 20.5 30 22 L30 43 Z" fill="#FFFFFF" />
    
    <!-- Right Pillar -->
    <path d="M33 43 L33 15 C33 13.5 35.5 13.5 35.5 15 L35.5 43 Z" fill="#FFFFFF" />

    <!-- Gold Sweeping Arrow (curved path) -->
    <path d="M13 36 Q22 39 46 17" fill="none" stroke="#E5C158" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Arrow Head (Pointing Top-Right) -->
    <path d="M46 17 L39 19.5 L43.5 24 Z" fill="#E5C158" />
  </g>
</svg>
